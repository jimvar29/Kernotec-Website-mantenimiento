<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="msapplication-TileColor" content="#da532c">
    <meta charset="utf-8">
    <meta name="theme-color" content="#ffffff">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Somos una empresa orientada a la optimización de todas las actividades y requerimientos de cualquier empresa en el rubro tecnológico en las áreas de Desarrollo de Software, Telecomunicaciones , seguridad electrónica y soporte técnico.">
    <meta name="keywords" content="Kernotec, Desarrollo Web, Telecomunicaciones, Soporte Técnico, Innovación Tecnológica, Software a medida">
    <meta name="author" content="KERNOTEC">
    
    <link rel="icon" type="image/x-icon" href="img/isotipo-kernotec.ico">

    <title>KernoTec - Página en Mantenimiento</title>
    <link rel="stylesheet" href="./css/style.css?v=1.0.1">
</head>

<body class="maintenance">

    <div class="maintenance__background"></div>

    <div class="maintenance__container">


        <div class="maintenance__logo-wrapper">
            <img src="./img/logo_kerno.png" alt="KernoTec Logo" class="maintenance__logo-img">
        </div>


        <div class="maintenance__gears-wrapper">
            <object data="./svg/tuercascompletas.svg?v=2" type="image/svg+xml" aria-hidden="true"
                class="maintenance__gear maintenance__gear--top-left"></object>
            <object data="./svg/tuercascompletas.svg?v=2" type="image/svg+xml" aria-hidden="true"
                class="maintenance__gear maintenance__gear--top-right"></object>
        </div>


        <div class="maintenance__message">
            <div class="maintenance__banner-wrapper">
                <img src="./svg/BLANCOS_WEB_B_.svg" alt="" role="presentation" class="maintenance__banner-svg">

                <div class="maintenance__banner-content">
                    <h1 class="maintenance__title">
                        <span class="maintenance__title--light">Página</span> <span class="maintenance__title--bold">en Mantenimiento</span>
                    </h1>
                    <p class="maintenance__subtitle">Estamos trabajando en mejorar nuestros servicios</p>
                </div>
            </div>
        </div>

    </div>

    <footer class="maintenance__footer">
        <img src="./svg/BLANCOS_WEB_%20A_.svg" alt="" role="presentation" class="maintenance__footer-bg">
        <div class="maintenance__brands">
            <img src="./img/logokerno_dev.png" alt="Kerno Dev" class="maintenance__brand-logo">
            <img src="./img/logokern_tel.png" alt="Kerno Tel" class="maintenance__brand-logo">
            <img src="./img/logokerno_brnd.png" alt="Kerno Brand" class="maintenance__brand-logo">
        </div>
    </footer>

</body>

</html>
